<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./practica-calificada8.js" type="module"></script>
    <link rel="stylesheet" href="./styles.css">
    <title>Document</title>
</head>

<body>
    <div id="contenedorUsuarios">
        <div>
            <h1>Tarjetas de Usuarios</h1>
            <button id="btnAgregarUsuario">Agregar Usuario</button>
        </div>
        <div id="listaUsuarios"></div>

    </div>
    <div id="contenedorProductos">
        <div>
            <h1>Tabla de Productos</h1>
            <button id="btnAgregarProducto">Agregar Producto</button>
        </div>       

        <div>
            <table id="tabla">
            <thead>
                <tr>
                   <th>Nombre</th>
                   <th>Precio</th>
                   <th>Stock</th>
                   <th>Propiedades adicionales</th>
                </tr>
            </thead>
            <tbody id="filasProductos">
               
            </tbody>
        </table>

        </div>
        
    </div>
    <div>
        <div>
            <h1>lista de Tareas</h1>
            <button id="btnAgregarTarea">Agregar Tarea</button>
        </div>        
        <ul id="lista-tareas"></ul>
    </div>

    <div id="contenedorEstudiantes">
        <h1>Tabla de Estudiantes</h1>
        <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Promedio</th>
            </tr>
        </thead>
        <tbody id="filasEstudiantes">
            
        </tbody>
    </table>
    <button id="btnCargarEstudiantes">Mostrar Estudiantes</button>

    </div>


    <div id="contenedorApp">
        <h1>Configuración de App</h1>
    </div>

</body>

</html>
